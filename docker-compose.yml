version: "3.9"

services:
  # ChromaDB — vector store for RAG embeddings
  chromadb:
    image: chromadb/chroma:latest
    container_name: finguard-chromadb
    ports:
      - "8100:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped

  # Redis — LLM response cache + rate limiting (optional, for production)
  redis:
    image: redis:7-alpine
    container_name: finguard-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped

volumes:
  chroma_data:
  redis_data:
